<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Tracker</title>
<script src="https://unpkg.com/@azure/msal-browser@3.10.0/lib/msal-browser.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#f7f6f3;--surface:#fff;--surface2:#f0efe9;--border:#e2e0d8;--border2:#cccac0;--text:#1a1916;--text2:#6b6860;--text3:#9e9b93;--green:#16a34a;--green-bg:#f0fdf4;--amber:#d97706;--amber-bg:#fffbeb;--red:#dc2626;--red-bg:#fef2f2;--blue:#2563eb;--blue-bg:#eff6ff;--radius:8px;--radius-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}
#auth-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.auth-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:3rem 2.5rem;max-width:420px;width:100%;text-align:center}
.auth-card .logo{font-size:2.5rem;margin-bottom:1rem}
.auth-card h1{font-size:22px;font-weight:600;margin-bottom:.5rem}
.auth-card p{color:var(--text2);font-size:13px;line-height:1.6;margin-bottom:2rem}
.btn-ms{display:inline-flex;align-items:center;gap:10px;background:#0078d4;color:#fff;border:none;border-radius:var(--radius);padding:12px 24px;font-size:14px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;width:100%;justify-content:center;transition:background .15s}
.btn-ms:hover{background:#106ebe}
.auth-note{margin-top:1.5rem;font-size:12px;color:var(--text3);line-height:1.5}
#file-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.file-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:2.5rem;max-width:500px;width:100%}
.file-card h2{font-size:18px;font-weight:600;margin-bottom:.5rem}
.file-card p{color:var(--text2);font-size:13px;margin-bottom:1.5rem}
.file-input-row{display:flex;gap:8px;margin-bottom:1rem}
.file-input-row input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text)}
.btn-primary{background:var(--text);color:#fff;border:none;border-radius:var(--radius);padding:9px 18px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:opacity .15s;white-space:nowrap}
.btn-primary:hover{opacity:.85}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border2);border-radius:var(--radius);padding:8px 16px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s}
.btn-secondary:hover{background:var(--surface2)}
.file-hint{font-size:12px;color:var(--text3)}
.status-msg{margin-top:1rem;padding:10px 14px;border-radius:var(--radius);font-size:13px}
.status-msg.info{background:var(--blue-bg);color:var(--blue)}
.status-msg.error{background:var(--red-bg);color:var(--red)}
.status-msg.success{background:var(--green-bg);color:var(--green)}
#app{display:none;min-height:100vh}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:52px;position:sticky;top:0;z-index:50}
.topbar-brand{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.topbar-brand svg{flex-shrink:0}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.sync-indicator{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:5px}
.sync-dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.sync-dot.syncing{background:var(--amber);animation:pulse 1s infinite}
.sync-dot.error{background:var(--red)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.user-chip{font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:99px;padding:4px 12px}
.btn-signout{font-size:12px;color:var(--text2);background:none;border:1px solid var(--border);border-radius:var(--radius);padding:5px 10px;cursor:pointer;font-family:'DM Sans',sans-serif}
.btn-signout:hover{background:var(--surface2)}
.tabs-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;gap:0;overflow-x:auto;position:sticky;top:52px;z-index:40}
.tab-btn{padding:12px 16px;font-size:13px;font-weight:500;color:var(--text2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:color .15s}
.tab-btn:hover{color:var(--text)}
.tab-btn.active{color:var(--text);border-bottom-color:var(--text)}
.content{padding:1.5rem;max-width:1400px;margin:0 auto}
.dash-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:1.5rem}
.dash-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1rem 1.25rem}
.dash-card .dc-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px}
.dash-card .dc-value{font-size:22px;font-weight:600}
.dash-card .dc-value.green{color:var(--green)}
.dash-card .dc-value.red{color:var(--red)}
.dash-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1rem}
.dash-section h3{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--text3);margin-bottom:1rem}
.dash-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.dash-row:last-child{border-bottom:none}
.dash-row .dr-val{font-weight:500;font-family:'DM Mono',monospace}
.dash-row .dr-val.green{color:var(--green)}
.dash-row .dr-val.red{color:var(--red)}
.adv-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:var(--radius);margin-bottom:6px;font-size:13px}
.adv-item.red-item{background:var(--red-bg);border-left:3px solid var(--red)}
.adv-item.amber-item{background:var(--amber-bg);border-left:3px solid var(--amber)}
.adv-item.green-item{background:var(--green-bg);border-left:3px solid var(--green)}
.adv-days{font-size:11px;color:var(--text3);margin-left:auto;font-family:'DM Mono',monospace}
.toolbar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.toolbar input[type=text],.toolbar select{height:34px;padding:0 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--text)}
.toolbar input[type=text]{min-width:180px}
.toolbar input[type=text]:focus,.toolbar select:focus{outline:none;border-color:var(--border2)}
.table-outer{overflow-x:auto;border:1px solid var(--border);border-radius:var(--radius-lg);background:var(--surface);max-height:calc(100vh - 200px);overflow-y:auto}
.table-outer table{width:100%;border-collapse:collapse;font-size:13px}
.table-outer thead th{position:sticky;top:0;z-index:10;text-align:left;padding:9px 12px;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--surface2);white-space:nowrap;cursor:pointer;user-select:none}
.table-outer thead th:hover{color:var(--text)}
.table-outer thead th .sa{font-size:10px;margin-left:3px;opacity:.4}
.table-outer thead th.sort-asc .sa::after{content:'▲';opacity:1}
.table-outer thead th.sort-desc .sa::after{content:'▼';opacity:1}
.table-outer thead th:not(.sort-asc):not(.sort-desc) .sa::after{content:'⇅'}
td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle;white-space:nowrap}
tr:last-child td{border-bottom:none}
tbody tr{cursor:pointer;transition:background .1s}
tbody tr:hover td{background:var(--bg)}
.mono{font-family:'DM Mono',monospace;font-size:12px}
.empty-row td{text-align:center;color:var(--text3);padding:3rem;cursor:default}
/* checkbox col */
.cb-col{width:36px;text-align:center!important;padding:9px 6px!important}
.cb-col input{cursor:pointer;accent-color:var(--blue)}
.row-selected td{background:#eff6ff!important}
.bulk-bar{display:none;align-items:center;gap:10px;background:var(--blue-bg);border:1px solid #bfdbfe;border-radius:var(--radius);padding:8px 14px;margin-bottom:10px;font-size:13px}
.bulk-bar.visible{display:flex}
.bulk-bar strong{color:var(--blue)}
/* badges + status dropdown */
.badge{display:inline-block;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:600;cursor:pointer;position:relative}
.badge-sold{background:var(--green-bg);color:var(--green)}
.badge-received{background:#f0f9ff;color:#0369a1}
.badge-purchased{background:#fdf4ff;color:#7e22ce}
.badge-advertised{background:var(--blue-bg);color:var(--blue)}
.badge-posted{background:var(--amber-bg);color:var(--amber)}
.badge-delivered{background:#dcfce7;color:#166534}
.badge-defect{background:var(--red-bg);color:var(--red)}
.badge-other{background:var(--surface2);color:var(--text2)}
.status-dropdown{position:fixed;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:300;min-width:160px;overflow:hidden}
.status-dropdown-item{padding:8px 14px;font-size:13px;cursor:pointer;border-bottom:1px solid var(--border)}
.status-dropdown-item:last-child{border-bottom:none}
.status-dropdown-item:hover{background:var(--bg)}
.profit-pos{color:var(--green);font-weight:500;font-family:'DM Mono',monospace}
.profit-neg{color:var(--red);font-weight:500;font-family:'DM Mono',monospace}
.profit-zero{color:var(--text3);font-family:'DM Mono',monospace}
.adv-red{background:#fef2f2!important}
.adv-amber{background:#fffbeb!important}
.adv-green{background:#f0fdf4!important}
/* low profit warning */
.profit-warn{color:var(--amber);font-weight:500;font-family:'DM Mono',monospace}
.btn-edit{padding:3px 10px;border:1px solid var(--border);border-radius:6px;background:none;cursor:pointer;font-size:12px;color:var(--text2);font-family:'DM Sans',sans-serif}
.btn-edit:hover{background:var(--surface2);color:var(--text)}
.btn-danger{padding:3px 10px;border:1px solid #fecaca;border-radius:6px;background:none;cursor:pointer;font-size:12px;color:var(--red);font-family:'DM Sans',sans-serif}
.btn-danger:hover{background:var(--red-bg)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:flex;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.modal{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);width:min(720px,100%)}
.modal-header{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-header h3{font-size:16px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;font-size:18px;color:var(--text3);padding:4px;line-height:1}
.modal-close:hover{color:var(--text)}
.modal-body{padding:1.5rem;max-height:70vh;overflow-y:auto}
.modal-footer{padding:1rem 1.5rem;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px}
.modal-footer-actions{display:flex;gap:8px;margin-left:auto}
.form-section{margin-bottom:1.5rem}
.form-section-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--text3);margin-bottom:.75rem;padding-bottom:6px;border-bottom:1px solid var(--border)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid.cols3{grid-template-columns:1fr 1fr 1fr}
.field{display:flex;flex-direction:column;gap:4px}
.field.full{grid-column:1/-1}
.field label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select,.field textarea{padding:7px 10px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);transition:border-color .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--border2);background:var(--surface)}
.field input[readonly]{opacity:.6;cursor:not-allowed}
.field textarea{resize:vertical;min-height:70px}
/* notes expand */
.notes-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;color:var(--text2);cursor:pointer;transition:max-width .2s}
.notes-cell.expanded{max-width:400px;white-space:normal}
.strategy-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:1rem;overflow:hidden}
.strat-header{padding:1rem 1.25rem;background:var(--surface2);border-bottom:1px solid var(--border)}
.strat-header h3{font-size:14px;font-weight:600}
.strat-table{width:100%;border-collapse:collapse;font-size:13px}
.strat-table th{padding:8px 14px;text-align:left;font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.04em;border-bottom:1px solid var(--border);background:var(--surface)}
.strat-table td{padding:9px 14px;border-bottom:1px solid var(--border)}
.strat-table tr:last-child td{border-bottom:none}
.strat-table tr:hover td{background:var(--bg)}
.loading{display:flex;align-items:center;justify-content:center;padding:4rem;color:var(--text3);gap:10px}
.spinner{width:18px;height:18px;border:2px solid var(--border);border-top-color:var(--text2);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.toast-container{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--text);color:#fff;padding:10px 16px;border-radius:var(--radius);font-size:13px;font-weight:500;animation:slide-in .2s ease;max-width:320px}
.toast.success{background:var(--green)}
.toast.error{background:var(--red)}
.toast.warn{background:var(--amber)}
@keyframes slide-in{from{transform:translateX(20px);opacity:0}to{transform:translateX(0);opacity:1}}
/* Reports */
.report-controls{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;margin-bottom:1.25rem;display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
.report-controls .field{min-width:140px}
.chart-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
.chart-grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}
.chart-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem}
.chart-card h3{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:1rem}
.chart-card canvas{max-height:220px}
/* Break-even calculator */
.calc-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
.calc-card h3{font-size:15px;font-weight:600;margin-bottom:1.25rem}
.calc-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:1.25rem}
.calc-result{background:var(--surface2);border-radius:var(--radius);padding:1rem 1.25rem;display:flex;flex-direction:column;gap:4px}
.calc-result .cr-label{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.calc-result .cr-value{font-size:22px;font-weight:600}
.calc-result .cr-value.green{color:var(--green)}
.calc-result .cr-value.red{color:var(--red)}
.calc-result .cr-value.amber{color:var(--amber)}
/* Column manager */
.col-list{flex:1;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.col-list-header{padding:8px 12px;background:var(--surface2);font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;color:var(--text3);border-bottom:1px solid var(--border)}
.col-list-body{max-height:360px;overflow-y:auto}
.col-item{display:flex;align-items:center;gap:10px;padding:8px 12px;border-bottom:1px solid var(--border);font-size:13px;cursor:grab}
.col-item:last-child{border-bottom:none}
.col-item:hover{background:var(--bg)}
.col-item.dragging{opacity:.4;background:var(--blue-bg)}
.col-item.drag-over{border-top:2px solid var(--blue)}
.col-drag-handle{color:var(--text3);cursor:grab;font-size:16px;line-height:1}
.col-item input[type=checkbox]{accent-color:var(--blue);width:15px;height:15px;cursor:pointer;flex-shrink:0}
.col-label-input{flex:1;border:none;background:transparent;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--text);padding:2px 4px;border-radius:4px}
.col-label-input:focus{outline:none;background:var(--surface2)}
.col-key{font-size:11px;color:var(--text3);font-family:'DM Mono',monospace;white-space:nowrap}
.col-manager-hint{font-size:12px;color:var(--text3);margin-top:.75rem;line-height:1.5}
/* mobile quick-add */
.quick-add-fab{display:none;position:fixed;bottom:1.5rem;right:1.5rem;z-index:100;width:52px;height:52px;border-radius:50%;background:var(--text);color:#fff;border:none;font-size:24px;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.2);align-items:center;justify-content:center}
@media(max-width:700px){
  .chart-grid{grid-template-columns:1fr}.chart-grid3{grid-template-columns:1fr}
  .form-grid{grid-template-columns:1fr}.form-grid.cols3{grid-template-columns:1fr}
  .dash-grid{grid-template-columns:1fr 1fr}
  .topbar{padding:0 1rem}.tabs-bar{padding:0 1rem}
  .modal-overlay{padding:.5rem}
  .report-controls{flex-direction:column}
  .quick-add-fab{display:flex}
  .toolbar .btn-primary{display:none}
}
</style>
</head>
<body>

<div id="auth-screen">
  <div class="auth-card">
    <div class="logo">🔍</div>
    <h1>Product Tracker</h1>
    <p>Sign in with your Microsoft account to connect to your OneDrive Excel spreadsheet.</p>
    <button class="btn-ms" id="signin-btn" onclick="signIn()">
      <svg width="20" height="20" viewBox="0 0 21 21" fill="none"><rect x="1" y="1" width="9" height="9" fill="#F25022"/><rect x="11" y="1" width="9" height="9" fill="#7FBA00"/><rect x="1" y="11" width="9" height="9" fill="#00A4EF"/><rect x="11" y="11" width="9" height="9" fill="#FFB900"/></svg>
      Sign in with Microsoft
    </button>
    <p class="auth-note">Your data stays in your own OneDrive account.</p>
  </div>
</div>

<div id="file-screen" style="display:none">
  <div class="file-card">
    <h2>Connect your spreadsheet</h2>
    <p>Enter the path to your Products.xlsx in OneDrive.</p>
    <div class="file-input-row">
      <input type="text" id="file-path-input" placeholder="Products.xlsx" value="Products.xlsx">
      <button class="btn-primary" onclick="connectFile()">Connect</button>
    </div>
    <p class="file-hint">If it's in a folder: <strong>Folder/Products.xlsx</strong></p>
    <div id="file-status"></div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Product Tracker
    </div>
    <div class="topbar-right">
      <div class="sync-indicator"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Connected</span></div>
      <div class="user-chip" id="user-chip"></div>
      <button class="btn-signout" onclick="openSettingsModal()">⚙ Settings</button>
      <button class="btn-signout" onclick="openAbout()">About</button>
      <button class="btn-signout" onclick="signOut()">Sign out</button>
    </div>
  </div>
  <div class="tabs-bar">
    <button class="tab-btn active" onclick="switchTab('dashboard',this)">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('products',this)">Products</button>
    <button class="tab-btn" onclick="switchTab('accessories',this)">Accessories</button>
    <button class="tab-btn" onclick="switchTab('tools',this)">Tools</button>
    <button class="tab-btn" onclick="switchTab('strategy',this)">Strategy</button>
    <button class="tab-btn" onclick="switchTab('reports',this)">Reports</button>
    <button class="tab-btn" onclick="switchTab('calculator',this)">Calculator</button>
  </div>
  <div class="content">
    <div id="tab-dashboard"></div>
    <div id="tab-products" style="display:none"></div>
    <div id="tab-accessories" style="display:none"></div>
    <div id="tab-tools" style="display:none"></div>
    <div id="tab-strategy" style="display:none"></div>
    <div id="tab-reports" style="display:none"></div>
    <div id="tab-calculator" style="display:none"></div>
  </div>
</div>

<!-- Mobile FAB -->
<button class="quick-add-fab" onclick="openProductModal(null)" title="Quick add product">+</button>

<div class="toast-container" id="toasts"></div>

<script>
const MSAL_CONFIG={auth:{clientId:"e079eda8-38fc-4c2a-a92b-6074d7c39ec0",authority:"https://login.microsoftonline.com/consumers",redirectUri:window.location.origin+window.location.pathname},cache:{cacheLocation:"localStorage",storeAuthStateInCookie:true},system:{allowNativeBroker:false}};
const SCOPES=["Files.ReadWrite","User.Read"];

function loadColConfig(){
  try{
    const s=localStorage.getItem('pt_cols');
    if(s){
      const parsed=JSON.parse(s);
      // Validate that saved config has all the required keys - if not, reset to defaults
      const savedKeys=parsed.map(c=>c.k).sort().join(',');
      const defaultKeys=DEFAULT_COLS.map(c=>c.k).sort().join(',');
      if(savedKeys===defaultKeys) return parsed;
      // Keys don't match (e.g. after a schema change) - fall through to defaults
    }
  }catch{}
  return DEFAULT_COLS.map(c=>({...c}));
}

// ── EXCEL API ─────────────────────────────────────────────────────────────────
const BASE=()=>`/me/drive/items/${fileItemId}/workbook`;
async function excelApi(method,path,body){const t=await getToken();const res=await fetch(GRAPH+BASE()+path,{method,headers:{'Authorization':'Bearer '+t,'Content-Type':'application/json'},body:body?JSON.stringify(body):undefined});if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||'Excel error '+res.status);}if(res.status===204)return null;return res.json();}
async function readSheet(name){const r=await excelApi('GET',`/worksheets/${encodeURIComponent(name)}/usedRange`);return r.values||[];}
async function writeRow(sheet,rowIndex,values){const ec=columnLetter(values.length);await excelApi('PATCH',`/worksheets/${encodeURIComponent(sheet)}/range(address='A${rowIndex}:${ec}${rowIndex}')`,{values:[values]});}

async function appendRow(sheet,values){
  // Always re-read the sheet fresh to get the true last row
  const fresh=await readSheet(sheet);
  let last=1;
  for(let i=1;i<fresh.length;i++){
    if(fresh[i].some(c=>c!==null&&c!==undefined&&c!==''))last=i+1;
  }
  const nr=last+1;
  const ec=columnLetter(values.length);
  await excelApi('PATCH',`/worksheets/${encodeURIComponent(sheet)}/range(address='A${nr}:${ec}${nr}')`,{values:[values]});
  return nr;
}

function columnLetter(n){let r='';while(n>0){const rem=(n-1)%26;r=String.fromCharCode(65+rem)+r;n=Math.floor((n-1)/26);}return r;}

function rowsToObjects(rows,useFixedHeaders){
  if(!rows.length)return[];
  // If useFixedHeaders is true, use PRODUCT_HEADERS as keys (ignores renamed Excel headers)
  // This ensures r.Internal_ID always works even if the Excel header says "ID"
  const h=useFixedHeaders?PRODUCT_HEADERS:rows[0];
  return rows.slice(1).map((row,i)=>{
    const o={};
    h.forEach((k,j)=>{o[k]=row[j]??'';});
    o.__row=i+2;
    return o;
  });
}
function badge(status,id){const s=(status||'').toString().trim().toLowerCase();let cls='badge-other';if(s==='sold')cls='badge-sold';else if(s==='received')cls='badge-received';else if(s==='purchased')cls='badge-purchased';else if(s==='advertised')cls='badge-advertised';else if(s==='posted to buyer')cls='badge-posted';else if(s==='received by buyer')cls='badge-delivered';else if(s==='defect')cls='badge-defect';if(!s||s==='0')return'';return`<span class="badge ${cls}" onclick="event.stopPropagation();openStatusDropdown(event,'${id}')" title="Click to change status">${status}</span>`;}
function fmtCurrency(v){const n=parseFloat(v);return isNaN(n)||v===''||v===null?'—':'£'+n.toFixed(2);}
function profitHtml(v,salePrice){
  const n=parseFloat(v);if(isNaN(n)||v===''||v===null)return'<span class="profit-zero">—</span>';
  const sp=parseFloat(salePrice)||0;
  const cost=sp>0?sp-n:0;
  const markup=cost>0?(n/cost)*100:0;
  const warn=n>0&&cost>0&&markup<settings.minProfitPct;
  const cls=warn?'profit-warn':n>0?'profit-pos':n<0?'profit-neg':'profit-zero';
  const title=warn?`Markup ${markup.toFixed(1)}% — below ${settings.minProfitPct}% target`:`Markup on cost: ${cost>0?markup.toFixed(1)+'%':'no sale price'}`;
  return`<span class="${cls}" title="${title}">${n>0?'+':''}£${n.toFixed(2)}${warn?' ⚠':''}</span>`;
}
function excelSerialToDate(s){return new Date(Date.UTC(1899,11,30)+s*86400000);}
function fmtDate(v){if(!v||v===''||v===0||v==='0')return'—';const s=v.toString().trim();if(/^\d{5,6}$/.test(s)&&parseInt(s)>40000){const d=excelSerialToDate(parseInt(s));return isNaN(d)?s:d.toLocaleDateString('en-GB');}if(s.includes('T')||(s.includes('-')&&s.length>=10)){const d=new Date(s);return isNaN(d)?s:d.toLocaleDateString('en-GB');}if(/^\d{2}\/\d{2}\/\d{4}$/.test(s))return s;return s;}
function parseDateValue(v){if(!v||v===''||v===0||v==='0')return null;const s=v.toString().trim();if(/^\d{5,6}$/.test(s)&&parseInt(s)>40000)return excelSerialToDate(parseInt(s));if(s.includes('T')||(s.includes('-')&&s.length>=10)){const d=new Date(s);return isNaN(d)?null:d;}if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[dd,mm,yyyy]=s.split('/');return new Date(`${yyyy}-${mm}-${dd}`);}return null;}
function toDateInput(v){const d=parseDateValue(v);if(!d)return'';return d.toISOString().substring(0,10);}
function advDateClass(row){const status=(row.Status||'').toString().trim().toLowerCase();if(status!=='advertised')return'';const d=parseDateValue(row['Advertised Date']);if(!d)return'';const days=Math.floor((new Date()-d)/(1000*60*60*24));if(days>=10)return'adv-red';if(days>=5)return'adv-amber';if(days>=0)return'adv-green';return'';}
function toast(msg,type=''){const c=document.getElementById('toasts');const el=document.createElement('div');el.className='toast '+type;el.textContent=msg;c.appendChild(el);setTimeout(()=>el.remove(),3500);}
function nextId(prefix,rows){const nums=rows.map(r=>r.Internal_ID||'').filter(id=>id.toString().startsWith(prefix)).map(id=>parseInt(id.toString().replace(prefix,''))||0);const max=nums.length?Math.max(...nums):99;return prefix+(max+1);}

async function checkOverdueNotifications(){
  if(!settings.notifEnabled)return;
  if(!('Notification' in window))return;
  if(Notification.permission!=='granted')return;
  const products=rowsToObjects(sheetData.Product,true);
  const overdue=products.filter(r=>{
    if((r.Status||'').toString().trim().toLowerCase()!=='advertised')return false;
    const d=parseDateValue(r['Advertised Date']);
    if(!d)return false;
    return Math.floor((new Date()-d)/(1000*60*60*24))>=10;
  });
  if(overdue.length>0){
    new Notification('Product Tracker — Action needed',{body:`${overdue.length} listing${overdue.length>1?'s are':' is'} 10+ days old: ${overdue.map(r=>r.Internal_ID).join(', ')}`,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔍</text></svg>'});
  }
}

async function requestNotifPermission(){
  if(!('Notification' in window)){toast('Notifications not supported in this browser','error');return;}
  const perm=await Notification.requestPermission();
  if(perm==='granted'){settings.notifEnabled=true;saveSettings();toast('Notifications enabled!','success');}
  else{settings.notifEnabled=false;saveSettings();toast('Notification permission denied','error');}
}

  if(!newStatus||selectedRows.size===0)return;
  if(!confirm(`Change ${selectedRows.size} items to "${newStatus}"?`))return;

// ── STATS ENGINE — single source of truth ─────────────────────────────────────
function calcStats(){
  const products=rowsToObjects(sheetData.Product,true);
  const accessories=rowsToObjects(sheetData.Accessories);
  const tools=rowsToObjects(sheetData.Tools);
  const soldStatuses=['sold','received by buyer','posted to buyer'];
  const sold=products.filter(r=>soldStatuses.includes((r.Status||'').toString().trim().toLowerCase()));
  const stockItems=products.filter(r=>getStockStatuses().includes((r.Status||'').toString().trim().toLowerCase()));

  const revenue=sold.reduce((a,r)=>a+parseFloat(r.Sale_price||0),0);
  const cogsItems=sold.reduce((a,r)=>a+parseFloat(r.Purchase_Price||0),0); // cost of sold items only
  const accCost=accessories.reduce((a,r)=>a+parseFloat(r.Purchase_Price||0),0);
  const toolCost=tools.reduce((a,r)=>a+parseFloat(r.Purchase_Price||0),0);
  const netProfit=revenue-cogsItems-accCost-toolCost;
  const grossProfit=revenue-cogsItems; // before overheads
  const allItemCost=products.reduce((a,r)=>a+parseFloat(r.Purchase_Price||0),0);
  const stockValue=stockItems.reduce((a,r)=>a+parseFloat(r.Purchase_Price||0),0);
  const pct=settings.minProfitPct||35;
  const stockMinSellValue=stockItems.reduce((a,r)=>a+(parseFloat(r.Purchase_Price||0)*(1+pct/100)),0);
  const profits=sold.map(r=>parseFloat(r.Profit||0)).filter(p=>!isNaN(p));
  const avgMarkup=sold.length?sold.reduce((a,r)=>{const p=parseFloat(r.Profit||0);const c=parseFloat(r.Purchase_Price||0);return a+(c>0?p/c*100:0);},0)/sold.length:0;

  // Status counts
  const byStatus={};
  products.forEach(r=>{const s=(r.Status||'Other').toString().trim();byStatus[s]=(byStatus[s]||0)+1;});

  return{
    totalItems:products.length,
    soldCount:sold.length,
    stockCount:stockItems.length,
    revenue,cogsItems,accCost,toolCost,
    netProfit,grossProfit,allItemCost,
    stockValue,stockMinSellValue,
    avgSalePrice:sold.length?revenue/sold.length:0,
    avgBuyPrice:products.length?allItemCost/products.length:0,
    avgMarkup,
    maxProfit:profits.length?Math.max(...profits):0,
    minProfit:profits.length?Math.min(...profits):0,
    avgProfit:profits.length?profits.reduce((a,b)=>a+b,0)/profits.length:0,
    byStatus,
    advertised:products.filter(r=>(r.Status||'').toString().trim().toLowerCase()==='advertised'),
    products,sold,stockItems
  };
}

          <button class="btn-secondary" onclick="statusAdd()">+ Add</button>
        </div>
        <p style="font-size:11px;color:var(--text3);margin-top:8px">Statuses are also written to a Settings sheet in your Excel file when you save.</p>

        <p style="font-size:13px;color:var(--text2);margin-bottom:10px">Get a browser notification when listings are 10+ days old.</p>

function statusToggle(idx,field,val){statusConfig[idx][field]=val;}
function statusDelete(idx){
  if(statusConfig.length<=1){toast('Must keep at least one status','error');return;}
  statusConfig.splice(idx,1);closeModal();openSettingsModal();
}
function statusAdd(){
  const inp=document.getElementById('new-status-name');
  const name=(inp?.value||'').trim();
  if(!name){toast('Enter a status name','error');return;}
  if(statusConfig.find(s=>s.name.toLowerCase()===name.toLowerCase())){toast('Status already exists','error');return;}
  statusConfig.push({name,inStock:true,inCost:true});
  inp.value='';closeModal();openSettingsModal();
}

async function saveSettingsFromModal(){
  settings.minProfitPct=parseFloat(document.getElementById('set_minprofit').value)||35;
  saveSettings();saveStatuses();
  // Write statuses to Excel Settings sheet
  try{
    // Try to get or create Settings sheet
    const sheets=await excelApi('GET','/worksheets');
    const existing=sheets.value.find(s=>s.name==='Settings');
    if(!existing){await excelApi('POST','/worksheets',{name:'Settings'});}
    const rows=[['Status','In Stock Calc','In Cost Calc'],...statusConfig.map(s=>[s.name,s.inStock?'Yes':'No',s.inCost?'Yes':'No'])];
    const ec=columnLetter(3);const er=rows.length;
    await excelApi('PATCH',`/worksheets/Settings/range(address='A1:${ec}${er}')`,{values:rows});
    toast('Settings saved and synced to Excel!','success');
  }catch(e){
    toast('Settings saved (Excel sync failed: '+e.message+')','warn');
  }
  closeModal();renderAll();
}

// ── PRODUCTS TABLE ────────────────────────────────────────────────────────────
function renderProductsTable(){
  let rows=rowsToObjects(sheetData.Product,true);
  const allRows=rows;
  rows=rows.filter(r=>{
    const q=productSearch.toLowerCase();
    const ms=!q||Object.values(r).filter(v=>typeof v==='string'||typeof v==='number').join(' ').toLowerCase().includes(q);
    const mf=!productFilter||(r.Status||'').toString().trim()===productFilter;
    return ms&&mf;
  });
  if(productSort.col){rows.sort((a,b)=>{let av=a[productSort.col]??'',bv=b[productSort.col]??'';const an=parseFloat(av),bn=parseFloat(bv);if(!isNaN(an)&&!isNaN(bn))return productSort.dir==='asc'?an-bn:bn-an;return productSort.dir==='asc'?av.toString().localeCompare(bv.toString()):bv.toString().localeCompare(av.toString());});}

  const visibleCols=colConfig.filter(c=>c.v);
  const allSelected=rows.length>0&&rows.every(r=>selectedRows.has(r.Internal_ID));
  const thHtml=`<th class="cb-col"><input type="checkbox" ${allSelected?'checked':''} onchange="toggleSelectAll(this.checked)"></th>`+
    visibleCols.map(c=>{const active=productSort.col===c.k;const cls=active?(productSort.dir==='asc'?'sort-asc':'sort-desc'):'';return`<th class="${cls}" onclick="sortProducts('${c.k}')">${c.l}<span class="sa"></span></th>`;}).join('');

  const tdHtml=rows.length?rows.map(r=>{
    const ac=advDateClass(r);
    const sel=selectedRows.has(r.Internal_ID);
    const cells=visibleCols.map(c=>{
      const v=r[c.k];
      if(c.k==='Status')return`<td>${badge(v,r.Internal_ID)}</td>`;
      if(c.k==='Purchase_Price'||c.k==='Sale_price')return`<td>${fmtCurrency(v)}</td>`;
      if(c.k==='Profit')return`<td>${profitHtml(v,r.Sale_price)}</td>`;
      if(c.k==='Purchase_date'||c.k==='Sale_date')return`<td>${fmtDate(v)}</td>`;
      if(c.k==='Advertised Date')return`<td class="${ac}">${fmtDate(v)}</td>`;
      if(c.k==='Cleaned'||c.k==='Ready_to_go')return`<td style="text-align:center">${v==='Yes'||v===true?'✓':''}</td>`;
      if(c.k==='Notes')return`<td><span class="notes-cell" onclick="event.stopPropagation();this.classList.toggle('expanded')" title="Click to expand">${v||''}</span></td>`;
      const isMono=['Internal_ID','Model_Code','Order/Invoice_number','Main_Unit_SN','Main_unit_void_sticker_SN','Battery_SN','Battery_Void_Sticker_SN','Motorised_Head_SN'].includes(c.k);
      return`<td class="${isMono?'mono':''}" style="${isMono?'font-size:11px':''}">${v||''}</td>`;
    }).join('');
    return`<tr data-id="${r.Internal_ID}" class="${sel?'row-selected':''}" onclick="openProductModal('${r.Internal_ID}')">
      <td class="cb-col" onclick="event.stopPropagation()"><input type="checkbox" ${sel?'checked':''} onchange="toggleRowSelect('${r.Internal_ID}',this.checked)"></td>
      ${cells}
    </tr>`;
  }).join(''):`<tr class="empty-row"><td colspan="${visibleCols.length+1}">No products found</td></tr>`;

  document.getElementById('tab-products').innerHTML=`
    <div id="bulk-bar" class="bulk-bar ${selectedRows.size>0?'visible':''}">
      <strong><span class="bulk-count">${selectedRows.size}</span> selected</strong>
      <select id="bulk-status-select" style="height:30px;padding:0 8px;border:1px solid var(--border);border-radius:var(--radius);font-size:13px;font-family:'DM Sans',sans-serif">
        <option value="">Change status to…</option>
        ${getStatuses().map(s=>`<option>${s}</option>`).join('')}
      </select>
      <button class="btn-primary" style="padding:5px 12px;font-size:12px" onclick="bulkUpdateStatus()">Apply</button>
      <button class="btn-danger" style="padding:5px 12px;font-size:12px" onclick="bulkDelete()">Delete selected</button>
      <button class="btn-secondary" style="padding:5px 12px;font-size:12px;margin-left:auto" onclick="selectedRows.clear();renderProductsTable()">Clear</button>
    </div>
    <div class="toolbar">
      <input type="text" placeholder="Search all fields…" value="${productSearch}" oninput="productSearch=this.value;renderProductsTable()">
      <select onchange="productFilter=this.value;renderProductsTable()">
        <option value="">All statuses</option>
        ${getStatuses().map(s=>`<option ${productFilter===s?'selected':''}>${s}</option>`).join('')}
      </select>
      <button class="btn-primary" onclick="openProductModal(null)">+ Add product</button>
      <button class="btn-secondary" onclick="openColumnManager()">⚙ Columns</button>
      <button class="btn-secondary" onclick="exportCSV()">↓ CSV</button>
      <button class="btn-secondary" onclick="loadAllSheets()">↻ Refresh</button>
      <span style="margin-left:auto;font-size:12px;color:var(--text3)">${rows.length} of ${allRows.length}</span>
    </div>
    <div class="table-outer"><table><thead><tr>${thHtml}</tr></thead><tbody>${tdHtml}</tbody></table></div>`;
}

function sortProducts(col){if(productSort.col===col)productSort.dir=productSort.dir==='asc'?'desc':'asc';else{productSort.col=col;productSort.dir='asc';}renderProductsTable();}

// ── COLUMN MANAGER ────────────────────────────────────────────────────────────
function openColumnManager(){
  closeModal();
  const overlay=document.createElement('div');overlay.className='modal-overlay';overlay.id='modal-overlay';
  const items=colConfig.map((c,i)=>`
    <div class="col-item" draggable="true" data-idx="${i}"
      ondragstart="colDragStart(event,${i})" ondragover="colDragOver(event,${i})"
      ondrop="colDrop(event,${i})" ondragend="colDragEnd(event)">
      <span class="col-drag-handle">⠿</span>
      <input type="checkbox" ${c.v?'checked':''} onchange="colToggle(${i},this.checked)">
      <input class="col-label-input" value="${c.l}" oninput="colRename(${i},this.value)" title="Edit display name">
      <span class="col-key">${c.k}</span>
    </div>`).join('');
  overlay.innerHTML=`<div class="modal">
    <div class="modal-header"><h3>Manage columns</h3><button class="modal-close" onclick="closeModal()">×</button></div>
    <div class="modal-body">
      <div class="col-list">
        <div class="col-list-header">⠿ Drag to reorder &nbsp;·&nbsp; ✓ tick to show &nbsp;·&nbsp; click name to rename</div>
        <div class="col-list-body">${items}</div>
      </div>
      <p class="col-manager-hint">Renaming updates the table and form labels immediately. Click "Save view" to also update the header row in your spreadsheet.</p>
    </div>
    <div class="modal-footer">
      <button class="btn-secondary" onclick="resetColConfig()">Reset defaults</button>
      <div class="modal-footer-actions">
        <button class="btn-secondary" onclick="closeModal()">Close</button>
        <button class="btn-primary" onclick="saveColNamesToExcel()">Save view</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(overlay);
}
function colToggle(idx,checked){colConfig[idx].v=checked;saveColConfig();renderProductsTable();}
function colRename(idx,val){colConfig[idx].l=val;saveColConfig();renderProductsTable();}
function colDragStart(e,idx){dragSrcIdx=idx;e.currentTarget.classList.add('dragging');e.dataTransfer.effectAllowed='move';}
function colDragOver(e,idx){e.preventDefault();document.querySelectorAll('.col-item').forEach(el=>el.classList.remove('drag-over'));if(idx!==dragSrcIdx)e.currentTarget.classList.add('drag-over');}
function colDrop(e,idx){e.preventDefault();if(dragSrcIdx===null||dragSrcIdx===idx)return;const moved=colConfig.splice(dragSrcIdx,1)[0];colConfig.splice(idx,0,moved);saveColConfig();renderProductsTable();closeModal();openColumnManager();}
function colDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('.col-item').forEach(el=>el.classList.remove('drag-over'));dragSrcIdx=null;}
function resetColConfig(){colConfig=DEFAULT_COLS.map(c=>({...c}));saveColConfig();closeModal();openColumnManager();renderProductsTable();}
async function saveColNamesToExcel(){
  setSyncing(true);
  // IMPORTANT: Always write headers in the fixed PRODUCT_HEADERS order (Excel column order)
  // colConfig may be reordered for display but Excel columns must never change order
  try{
    const headers=PRODUCT_HEADERS.map(key=>{
      const col=colConfig.find(c=>c.k===key);
      return col?col.l:key; // use renamed label if exists, else original key
    });
    const ec=columnLetter(headers.length);
    await excelApi('PATCH',`/worksheets/Product/range(address='A1:${ec}1')`,{values:[headers]});
    toast('Column names saved to Excel!','success');setSyncing(false);
  }
  catch(e){setSyncing(false,true);toast('Failed: '+e.message,'error');}
}

function recalcProfit(){const pp=parseFloat(document.getElementById('m_pprice')?.value)||0;const sp=parseFloat(document.getElementById('m_sprice')?.value)||0;const pf=document.getElementById('m_profit');if(pf&&sp)pf.value=(sp-pp).toFixed(2);}

async function saveProduct(isNew,excelRow){
  const pp=parseFloat(document.getElementById('m_pprice').value)||'';

async function saveRowToExcel(sheet,isNew,excelRow,values){
  setSyncing(true);
  try{if(isNew){await appendRow(sheet,values);toast('Added to Excel!','success');}else{await writeRow(sheet,excelRow,values);toast('Saved to Excel!','success');}closeModal();await loadAllSheets();}
  catch(e){setSyncing(false,true);toast('Save failed: '+e.message,'error');}
}

async function deleteRow(sheet,id,excelRow){
  if(!confirm(`Delete ${id}? This cannot be undone.`))return;setSyncing(true);
  try{const cols=PRODUCT_HEADERS.length;await excelApi('PATCH',`/worksheets/${encodeURIComponent(sheet)}/range(address='A${excelRow}:${columnLetter(cols)}${excelRow}')`,{values:[Array(cols).fill('')]});toast('Deleted','success');closeModal();await loadAllSheets();}
  catch(e){setSyncing(false,true);toast('Delete failed: '+e.message,'error');}
}

let activePreset='this_month';

function getPresetDates(val){
  const now=new Date();
  const p={this_week:[startOfWeek(now),now],this_month:[new Date(now.getFullYear(),now.getMonth(),1),now],last_month:[new Date(now.getFullYear(),now.getMonth()-1,1),new Date(now.getFullYear(),now.getMonth(),0)],this_year:[new Date(now.getFullYear(),0,1),now],last_year:[new Date(now.getFullYear()-1,0,1),new Date(now.getFullYear()-1,11,31)],all_time:[new Date('2000-01-01'),now]};
  return p[val]||p['this_month'];
}

function applyReportPreset(){
  const val=document.getElementById('rpt-preset').value;
  activePreset=val;
  const fw=document.getElementById('rpt-from-wrap'),tw=document.getElementById('rpt-to-wrap');
  if(val==='custom'){fw.style.display='';tw.style.display='';}
  else{fw.style.display='none';tw.style.display='none';drawReportCharts();}
}
function startOfWeek(d){const c=new Date(d);c.setDate(c.getDate()-c.getDay()+1);c.setHours(0,0,0,0);return c;}

function drawReportCharts(){
  const products=rowsToObjects(sheetData.Product,true);
  const soldStatuses=['sold','received by buyer','posted to buyer'];
  const isAllTime=activePreset==='all_time';
  let from,to;
  if(isAllTime){
    from=new Date('2000-01-01');to=new Date();to.setHours(23,59,59);
  } else if(activePreset==='custom'){
    from=new Date(document.getElementById('rpt-from').value);
    to=new Date(document.getElementById('rpt-to').value);to.setHours(23,59,59);
  } else {
    const[f,t]=getPresetDates(activePreset);from=new Date(f);to=new Date(t);to.setHours(23,59,59);
  }
  const purchased=products.filter(r=>{
    if(isAllTime)return true;
    const d=parseDateValue(r.Purchase_date);return d&&d>=from&&d<=to;
  });
  const sold=products.filter(r=>{
    const s=(r.Status||'').toLowerCase();
    if(!soldStatuses.includes(s))return false;
    if(isAllTime)return true;
    const d=parseDateValue(r.Sale_date);return d&&d>=from&&d<=to;
  });
  const mk=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
  const ml=k=>{const[y,m]=k.split('-');return new Date(y,m-1,1).toLocaleDateString('en-GB',{month:'short',year:'2-digit'});};
  const rev={},prf={},unt={},cst={};
  sold.forEach(r=>{const k=mk(parseDateValue(r.Sale_date));rev[k]=(rev[k]||0)+parseFloat(r.Sale_price||0);prf[k]=(prf[k]||0)+parseFloat(r.Profit||0);unt[k]=(unt[k]||0)+1;});
  purchased.forEach(r=>{const k=mk(parseDateValue(r.Purchase_date));cst[k]=(cst[k]||0)+parseFloat(r.Purchase_Price||0);});
  const months=[...new Set([...Object.keys(rev),...Object.keys(cst)])].sort();const labels=months.map(ml);

  const mkBar=(id,data,color,isCurrency=true)=>{if(reportCharts[id])reportCharts[id].destroy();const ctx=document.getElementById(id);if(!ctx)return;reportCharts[id]=new Chart(ctx,{type:'bar',data:{labels,datasets:[{data:months.map(m=>+(data[m]||0).toFixed(2)),backgroundColor:color+'33',borderColor:color,borderWidth:1.5,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>isCurrency?'£'+v:v}}}}});};
  mkBar('chart-revenue',rev,'#2563eb');mkBar('chart-profit',prf,'#16a34a');mkBar('chart-units',unt,'#d97706',false);mkBar('chart-costs',cst,'#dc2626');

  // Profit by platform
  const platProfit={};
  sold.forEach(r=>{const p=(r.Sale_Platform||'Other').toString().trim()||'Other';platProfit[p]=(platProfit[p]||0)+parseFloat(r.Profit||0);});
  if(reportCharts['chart-platform'])reportCharts['chart-platform'].destroy();
  const pCtx=document.getElementById('chart-platform');
  if(pCtx&&Object.keys(platProfit).length){reportCharts['chart-platform']=new Chart(pCtx,{type:'doughnut',data:{labels:Object.keys(platProfit),datasets:[{data:Object.values(platProfit).map(v=>+v.toFixed(2)),backgroundColor:['#2563eb','#16a34a','#d97706','#dc2626','#7e22ce','#0369a1']}]},options:{responsive:true,plugins:{legend:{position:'bottom'}}}});}

  // Profit by make
  const makeProfit={};
  sold.forEach(r=>{const m=(r.Make||'Unknown').toString().trim()||'Unknown';makeProfit[m]=(makeProfit[m]||0)+parseFloat(r.Profit||0);});
  const makeKeys=Object.keys(makeProfit).sort((a,b)=>makeProfit[b]-makeProfit[a]);
  if(reportCharts['chart-make'])reportCharts['chart-make'].destroy();
  const mCtx=document.getElementById('chart-make');
  if(mCtx){reportCharts['chart-make']=new Chart(mCtx,{type:'bar',data:{labels:makeKeys,datasets:[{data:makeKeys.map(k=>+makeProfit[k].toFixed(2)),backgroundColor:'#2563eb33',borderColor:'#2563eb',borderWidth:1.5,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'£'+v}}}}});}

  // Best & worst 5
  const withProfit=sold.filter(r=>r.Profit!==''&&r.Profit!==null).sort((a,b)=>parseFloat(b.Profit)-parseFloat(a.Profit));
  const top5=withProfit.slice(0,5);const bot5=[...withProfit].reverse().slice(0,5);
  const bwItems=[...top5,...bot5.reverse()];
  const bwLabels=bwItems.map(r=>r.Internal_ID);
  const bwData=bwItems.map(r=>+parseFloat(r.Profit).toFixed(2));
  const bwColors=bwData.map(v=>v>=0?'#16a34a':'#dc2626');
  if(reportCharts['chart-bestworst'])reportCharts['chart-bestworst'].destroy();
  const bwCtx=document.getElementById('chart-bestworst');
  if(bwCtx){reportCharts['chart-bestworst']=new Chart(bwCtx,{type:'bar',data:{labels:bwLabels,datasets:[{data:bwData,backgroundColor:bwColors.map(c=>c+'55'),borderColor:bwColors,borderWidth:1.5,borderRadius:4}]},options:{responsive:true,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>'£'+v}}}}});}

  // Period summary
  const pct=settings.minProfitPct||35;
  const tR=sold.reduce((a,r)=>a+parseFloat(r.Sale_price||0),0);
  const tP=sold.reduce((a,r)=>a+parseFloat(r.Profit||0),0);
  const tC=purchased.reduce((a,r)=>a+parseFloat(r.Purchase_Price||0),0);
  const belowTarget=sold.filter(r=>{const p=parseFloat(r.Profit||0);const c=parseFloat(r.Purchase_Price||0);return p>0&&c>0&&(p/c)*100<pct;}).length;
  const sumEl=document.getElementById('rpt-period-summary');
  if(sumEl)sumEl.innerHTML=`<h3>Period summary</h3>
    <div class="dash-row"><span style="display:flex;align-items:center">Items sold${info('Count of sold items in this period.')}</span><span class="dr-val">${sold.length}</span></div>
    <div class="dash-row"><span style="display:flex;align-items:center">Items purchased${info('Count of items bought in this period.')}</span><span class="dr-val">${purchased.length}</span></div>
    <div class="dash-row"><span style="display:flex;align-items:center">Revenue${info('Total sale prices in this period.')}</span><span class="dr-val green">£${tR.toFixed(2)}</span></div>
    <div class="dash-row"><span style="display:flex;align-items:center">Gross profit${info('Revenue minus cost of sold items for this period. Overheads not included in period breakdown.')}</span><span class="dr-val ${tP>=0?'green':'red'}">£${tP.toFixed(2)}</span></div>
    <div class="dash-row"><span style="display:flex;align-items:center">Purchase costs${info('Total spent buying items in this period.')}</span><span class="dr-val">£${tC.toFixed(2)}</span></div>
    <div class="dash-row"><span style="display:flex;align-items:center">Avg sale price${info('Average of all sale prices in this period.')}</span><span class="dr-val">${sold.length?'£'+(tR/sold.length).toFixed(2):'—'}</span></div>
    <div class="dash-row"><span style="display:flex;align-items:center">Avg profit/item${info('Average profit per sold item in this period.')}</span><span class="dr-val">${sold.length?'£'+(tP/sold.length).toFixed(2):'—'}</span></div>
    <div class="dash-row"><span style="display:flex;align-items:center">Sales below ${pct}% markup${info('Count of sales where the markup on cost was below your '+pct+'% target.')}</span><span class="dr-val" style="color:var(--amber)">${belowTarget}</span></div>`;
}

// ── SYNC DASHBOARD TO EXCEL ───────────────────────────────────────────────────
async function syncDashboardToExcel(){
  setSyncing(true);
  try{
    const st=calcStats();
    const pct=settings.minProfitPct||35;
    const f=v=>parseFloat(v.toFixed(2));
    const rows=[
      ['Product Tracker — Dashboard','Last synced: '+new Date().toLocaleString('en-GB')],
      [''],
      ['SALES & PROFIT',''],
      ['Total items bought',st.totalItems],
      ['Items sold',st.soldCount],
      ['Revenue (sold items)',f(st.revenue)],
      ['COGS (cost of sold items)',f(st.cogsItems)],
      ['Gross profit',f(st.grossProfit)],
      ['Accessories overhead',f(st.accCost)],
      ['Tools overhead',f(st.toolCost)],
      ['Net profit',f(st.netProfit)],
      [''],
      ['AVERAGES',''],
      ['Avg sale price',f(st.avgSalePrice)],
      ['Avg buy price',f(st.avgBuyPrice)],
      ['Avg markup %',f(st.avgMarkup)],
      ['Avg profit per sale',f(st.avgProfit)],
      ['Best sale profit',f(st.maxProfit)],
      ['Worst sale profit',f(st.minProfit)],
      [''],
      ['STOCK',''],
      ['Items in stock',st.stockCount],
      ['Stock value (at cost)',f(st.stockValue)],
      ['Est. stock sell value ('+pct+'% markup)',f(st.stockMinSellValue)],
      [''],
      ['BY STATUS',''],
      ...Object.entries(st.byStatus).map(([s,c])=>[s,c]),
    ];
    // Ensure Dashboard sheet exists
    const sheets=await excelApi('GET','/worksheets');
    const existing=sheets.value.find(s=>s.name==='Dashboard');
    if(!existing){await excelApi('POST','/worksheets',{name:'Dashboard'});}
    // Clear old content and write new
    const ec=columnLetter(2);const er=rows.length;
    await excelApi('PATCH',`/worksheets/Dashboard/range(address='A1:B${er}')`,{values:rows});
    toast('Dashboard synced to Excel!','success');setSyncing(false);
  }catch(e){setSyncing(false,true);toast('Sync failed: '+e.message,'error');}
}

// ── CALCULATOR ────────────────────────────────────────────────────────────────
function renderCalculator(){
  document.getElementById('tab-calculator').innerHTML=`
    <div class="calc-card">
      <h3>Break-even &amp; profit calculator</h3>
      <div class="calc-grid">
        <div class="field"><label>Purchase price (£)</label><input id="c_buy" type="number" step="0.01" placeholder="e.g. 45.00" oninput="calcUpdate()"></div>
        <div class="field"><label>Target margin (%)</label><input id="c_target" type="number" step="1" min="1" max="99" value="${settings.minProfitPct||35}" oninput="calcUpdate()"></div>
        <div class="field"><label>Sale price (£) — optional</label><input id="c_sell" type="number" step="0.01" placeholder="e.g. 110.00" oninput="calcUpdate()"></div>
      </div>
      <div class="calc-grid" id="calc-results"></div>
      <p style="font-size:12px;color:var(--text3);margin-top:1rem">Your minimum margin target is ${settings.minProfitPct||35}%. <button class="btn-edit" onclick="openSettingsModal()">Change</button></p>
    </div>
    <div class="calc-card">
      <h3>Stock profitability — unsold items</h3>
      <div class="table-outer" style="max-height:400px"><table>
        <thead><tr><th>ID</th><th>Make / Model</th><th>Status</th><th>Cost</th><th>Min sell (${settings.minProfitPct||35}% margin)</th><th>Break even</th></tr></thead>
        <tbody id="stock-table-body"></tbody>
      </table></div>
    </div>`;
  renderStockTable();
}

function calcUpdate(){
  const buy=parseFloat(document.getElementById('c_buy')?.value)||0;
  const target=parseFloat(document.getElementById('c_target')?.value)||settings.minProfitPct||35;
  const sell=parseFloat(document.getElementById('c_sell')?.value)||0;
  const breakEven=buy;
  const minSell=buy*(1+target/100);
  const actualProfit=sell?sell-buy:null;
  const actualMargin=buy>0?((sell-buy)/buy*100):null;
  const res=document.getElementById('calc-results');if(!res)return;
  res.innerHTML=`
    <div class="calc-result"><div class="cr-label">Break-even price</div><div class="cr-value">£${breakEven.toFixed(2)}</div></div>
    <div class="calc-result"><div class="cr-label">Min sell for ${target}% margin</div><div class="cr-value green">£${minSell.toFixed(2)}</div></div>
    ${actualProfit!==null?`
    <div class="calc-result"><div class="cr-label">Actual profit</div><div class="cr-value ${actualMargin>=target?'green':actualProfit>0?'amber':'red'}">£${actualProfit.toFixed(2)}</div></div>
    <div class="calc-result"><div class="cr-label">Actual markup</div><div class="cr-value ${actualMargin>=target?'green':actualProfit>0?'amber':'red'}">${actualMargin.toFixed(1)}%</div></div>`:''}`;
}

function renderStockTable(){
  const products=rowsToObjects(sheetData.Product,true);
  const unsold=products.filter(r=>{const s=(r.Status||'').toString().trim().toLowerCase();return getStockStatuses().includes(s)&&r.Purchase_Price;});
  const tbody=document.getElementById('stock-table-body');if(!tbody)return;
  tbody.innerHTML=unsold.length?unsold.map(r=>{
    const cost=parseFloat(r.Purchase_Price)||0;
    const pct=settings.minProfitPct||35;const minSell=(cost*(1+pct/100)).toFixed(2);
    return`<tr>
      <td class="mono">${r.Internal_ID}</td>
      <td>${r.Make||''} ${r.Model||''}</td>
      <td>${badge(r.Status,'')}</td>
      <td>${fmtCurrency(r.Purchase_Price)}</td>
      <td style="color:var(--green);font-weight:500;font-family:'DM Mono',monospace">£${minSell}</td>
      <td style="font-family:'DM Mono',monospace;color:var(--text2)">£${cost.toFixed(2)}</td>
    </tr>`;
  }).join(''):`<tr class="empty-row"><td colspan="6">No unsold items</td></tr>`;
}
